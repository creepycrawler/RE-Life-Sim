<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Business RPG</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover {
            background: #0056b3;
        }
        .info {
            font-size: 18px;
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Business RPG Test</h1>
        
        <div class="info">
            Week: <span id="week">1</span>
        </div>
        
        <div class="info">
            Cash: $<span id="cash">1000</span>
        </div>
        
        <div class="info">
            Job: <span id="job-display">Unemployed</span>
        </div>
        
        <label for="job-select">Select Job:</label>
        <select id="job-select">
            <option value="unemployed">Unemployed ($0/week)</option>
            <option value="intern">Intern ($400/week)</option>
            <option value="sales">Sales ($600/week)</option>
            <option value="developer">Developer ($800/week)</option>
        </select>
        
        <button class="btn" id="advance-btn">Advance 1 Week</button>
        
        <div id="debug" style="margin-top: 20px; padding: 10px; background: #ffe6e6; border-radius: 5px;">
            <strong>Debug Info:</strong><br>
            <span id="debug-text">Ready to start...</span>
        </div>
    </div>

    <script>
        // Simple game state
        let week = 1;
        let cash = 1000;
        let currentJob = 'unemployed';
        
        const jobs = {
            'unemployed': { name: 'Unemployed', salary: 0 },
            'intern': { name: 'Intern', salary: 400 },
            'sales': { name: 'Sales', salary: 600 },
            'developer': { name: 'Developer', salary: 800 }
        };
        
        function debug(message) {
            console.log(message);
            document.getElementById('debug-text').innerHTML += '<br>' + message;
        }
        
        function updateDisplay() {
            debug('Updating display...');
            document.getElementById('week').textContent = week;
            document.getElementById('cash').textContent = cash;
            document.getElementById('job-display').textContent = jobs[currentJob].name;
            debug('Display updated: Week ' + week + ', Cash $' + cash + ', Job ' + jobs[currentJob].name);
        }
        
        function advanceWeek() {
            debug('Button clicked! Advancing week...');
            
            week++;
            const salary = jobs[currentJob].salary;
            const expenses = 700;
            const netChange = salary - expenses;
            cash += netChange;
            
            debug('Week advanced to ' + week);
            debug('Salary: $' + salary + ', Expenses: $' + expenses + ', Net: $' + netChange);
            debug('New cash: $' + cash);
            
            updateDisplay();
            
            // Visual feedback
            const btn = document.getElementById('advance-btn');
            btn.textContent = 'Week Advanced!';
            btn.style.background = '#28a745';
            
            setTimeout(() => {
                btn.textContent = 'Advance 1 Week';
                btn.style.background = '#007bff';
            }, 1000);
        }
        
        function changeJob() {
            const select = document.getElementById('job-select');
            currentJob = select.value;
            debug('Job changed to: ' + jobs[currentJob].name);
            updateDisplay();
        }
        
        // Initialize when page loads
        window.onload = function() {
            debug('Page loaded, initializing...');
            
            // Set up event listeners
            document.getElementById('advance-btn').onclick = advanceWeek;
            document.getElementById('job-select').onchange = changeJob;
            
            // Initial display
            updateDisplay();
            
            debug('Initialization complete!');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business RPG - Corporate Climber</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Corporate Climber</h1>
            <div class="game-info">
                <span id="current-week">Week: 1</span>
                <span id="current-balance">Net Worth: $1000</span>
            </div>
        </header>

        <!-- Main Game Screen -->
        <div id="main-game" class="screen active">
            <div class="game-layout">
                <!-- Job Selection and Turn Control -->
                <div class="control-panel">
                    <div class="job-selection">
                        <label for="job-dropdown">Current Job:</label>
                        <select id="job-dropdown">
                            <option value="unemployed">Unemployed ($0/week)</option>
                            <option value="intern">Intern ($400/week)</option>
                            <option value="customer-service">Customer Service Rep ($450/week)</option>
                            <option value="entry-sales">Sales Associate ($600/week)</option>
                            <option value="project-coordinator">Project Coordinator ($650/week)</option>
                            <option value="marketing-coordinator">Marketing Coordinator ($700/week)</option>
                            <option value="data-analyst">Data Analyst ($750/week)</option>
                            <option value="junior-dev">Junior Developer ($800/week)</option>
                            <option value="financial-analyst">Financial Analyst ($900/week)</option>
                        </select>
                    </div>
                    
                    <div class="turn-controls">
                        <button id="advance-turn" class="btn primary large">Advance 1 Week</button>
                    </div>
                </div>

                <!-- Balance Sheet -->
                <div class="balance-sheet">
                    <h2>Financial Summary</h2>
                    
                    <div class="financial-section">
                        <h3>Assets</h3>
                        <div class="financial-item">
                            <span>Cash:</span>
                            <span id="cash-amount">$1000</span>
                        </div>
                        <div class="financial-item total">
                            <span>Total Assets:</span>
                            <span id="total-assets">$1000</span>
                        </div>
                    </div>
                    
                    <div class="financial-section">
                        <h3>Weekly Income</h3>
                        <div class="financial-item">
                            <span>Job Salary:</span>
                            <span id="job-income">$0</span>
                        </div>
                        <div class="financial-item total">
                            <span>Total Income:</span>
                            <span id="total-income">$0</span>
                        </div>
                    </div>

                    <div class="financial-section">
                        <h3>Weekly Expenses</h3>
                        <div class="financial-item">
                            <span>Living Expenses:</span>
                            <span id="living-expenses">-$500</span>
                        </div>
                        <div class="financial-item">
                            <span>Student Loans:</span>
                            <span id="student-loans">-$200</span>
                        </div>
                        <div class="financial-item total">
                            <span>Total Expenses:</span>
                            <span id="total-expenses">-$700</span>
                        </div>
                    </div>

                    <div class="financial-section net-worth">
                        <h3>Net Weekly Change</h3>
                        <div class="financial-item total large">
                            <span>Weekly Change:</span>
                            <span id="weekly-change">-$700</span>
                        </div>
                        <div class="financial-item total large">
                            <span>Net Worth:</span>
                            <span id="net-worth">$1000</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script src="script.js"></script>
</body>
</html>
